    sbSklad.from("sklad_items").select("*").order("name"),

  ]);

function calcSkladStock(itemId,moves){
  let t=0;
  moves.forEach(r=>{
    if(String(r.item_id||"").trim().toLowerCase()!==String(itemId).trim().toLowerCase())return;
    const q=parseFloat(r.qty)||0;
    const tp=String(r.move_type||"").trim();
    if(tp==="in"||tp==="scrap_return")t+=q;
    else if(tp==="out"||tp==="reserve"||tp==="scrap")t-=q;
  });
  return Math.max(0,Math.round(t*100)/100);
}

// ── Merge duplicates for PDF ──
function mergeResults(results){
  const map={};
  const info=[];
  Object.values(results).flat().forEach(it=>{
    if(it.isInfo){info.push({...it});return}
    const key=it.name+"|"+it.unit;
    if(map[key]){map[key].qty+=it.qty;map[key].cost+=it.cost}
    else map[key]={...it};
  });
  return[...info,...Object.values(map).sort((a,b)=>a.name.localeCompare(b.name))];
}

// ── PDF generation ──
function generatePDF(results,orderInfo){
  const merged=mergeResults(results);
  const total=merged.reduce((s,r)=>s+(r.cost||0),0);
  const now=new Date().toLocaleDateString("ru");
  
  let html=`<html><head><meta charset="utf-8"><title>Заказ ${orderInfo.order_number||"б/н"}</title>
  <style>
    @media print{@page{margin:15mm}}
    body{font-family:Arial,sans-serif;font-size:12px;color:#333;max-width:800px;margin:0 auto;padding:20px}

    .info span{margin-right:20px}
    table{width:100%;border-collapse:collapse;margin-top:10px}

    tr:nth-child(even){background:#fafafa}
    .r{text-align:right}
    .total{font-size:16px;font-weight:700;text-align:right;margin-top:14px;padding:10px;background:#f0f8f0;border-radius:6px}
    .section{margin-top:20px}
    .section h3{font-size:14px;margin-bottom:6px;color:#1a73e8;border-bottom:1px solid #e0e0e0;padding-bottom:4px}
    .footer{margin-top:30px;font-size:10px;color:#999;text-align:center}
    .auto{color:#888;font-style:italic}
  </style></head><body>
  <h1>К2 Балкон — Заказ на монтаж</h1>
  <div class="info">
    <span>№ ${orderInfo.order_number||"б/н"}</span>
    <span>Адрес: ${orderInfo.address||"—"}</span>
    <span>Тел: ${orderInfo.phone||"—"}</span>
    <span>Дата: ${now}</span>
  </div>`;

  // Детальная ведомость по секциям
  html+=`<h2 style="font-size:15px;margin-top:20px">Детальная ведомость</h2>`;
  Object.entries(results).forEach(([tabId,items])=>{
    if(!items||items.length===0)return;
    const tab=TABS.find(t=>t.id===tabId);
    html+=`<div class="section"><h3>${tab?.icon||""} ${tab?.label||tabId}</h3><table>
      <tr><th>Материал</th><th class="r">Кол-во</th><th>Ед.</th><th class="r">Цена</th><th class="r">Сумма</th></tr>`;
    items.forEach(it=>{
      if(it.isInfo){
        html+=`<tr style="background:#e8f0fe;font-weight:bold">
          <td colspan="2">📌 ${it.name}</td><td class="r">${it.qty}</td><td>${it.unit}</td>
          <td class="r">—</td><td class="r">—</td></tr>`;
      }else{
        html+=`<tr${it.auto?' class="auto"':''}>
          <td>${it.auto?"🔒 ":""}${it.name}</td><td class="r">${it.qty}</td><td>${it.unit}</td>
          <td class="r">${it.price?it.price+"₽":"—"}</td><td class="r">${it.cost?it.cost.toLocaleString("ru")+"₽":"—"}</td></tr>`;
      }
    });
    html+=`</table></div>`;
  });

  // Сводная таблица (объединённая)
  html+=`<h2 style="font-size:15px;margin-top:30px;page-break-before:auto">Сводная ведомость (объединённая)</h2>
  <table><tr><th>№</th><th>Материал</th><th class="r">Кол-во</th><th>Ед.</th><th class="r">Цена</th><th class="r">Сумма</th></tr>`;
  merged.forEach((it,i)=>{
    html+=`<tr><td>${i+1}</td><td>${it.name}</td><td class="r">${Math.round(it.qty*100)/100}</td><td>${it.unit}</td>

  });
  html+=`</table>`;
  html+=`<div class="total">ИТОГО: ${total.toLocaleString("ru")} ₽</div>`;
  html+=`<div class="footer">К2 Балкон — ${now}</div></body></html>`;

  const w=window.open("","_blank");
  w.document.write(html);
  w.document.close();
  setTimeout(()=>w.print(),500);
}

function Notif({msg,type,onClose}){
  useEffect(()=>{if(msg){const t=setTimeout(onClose,3000);return()=>clearTimeout(t)}},[msg]);

  return(<div style={{position:"fixed",top:16,right:16,padding:"12px 20px",borderRadius:12,fontSize:14,fontWeight:500,zIndex:9999,display:"flex",alignItems:"center",gap:12,animation:"slideUp .3s",boxShadow:"0 8px 32px rgba(0,0,0,.4)",background:type==="error"?"var(--danger)":"var(--success)",color:"#fff"}}>

// ── Tree Справочник ──
function TreeRef({db,refresh,notify}){
  const[expanded,setExpanded]=useState({});
  const[modal,setModal]=useState(null); // {type,parentId,...}
  const tog=(key)=>setExpanded(p=>({...p,[key]:!p[key]}));

  // Group data
  const tabCats=useMemo(()=>{
    const m={};
    TABS.forEach(t=>{m[t.id]=db.categories.filter(c=>c.tab_id===t.id)});
    return m;
  },[db]);

  const catOpts=useMemo(()=>{
    const m={};
    db.options.forEach(o=>{if(!m[o.category_id])m[o.category_id]=[];m[o.category_id].push(o)});
    return m;
  },[db]);

  const optMats=useMemo(()=>{
    const m={};
    db.optionMaterials.forEach(om=>{if(!m[om.option_id])m[om.option_id]=[];m[om.option_id].push(om)});
    return m;
  },[db]);

  // CRUD
  const addCategory=async(tabId,name)=>{
    if(!name.trim())return;
    const sort=tabCats[tabId]?.length||0;
    const{error}=await sb.from("categories").insert({tab_id:tabId,name:name.trim(),sort_order:sort+1});
    if(error)return notify(error.message,"error");
    notify("Категория создана");refresh();

  const delCategory=async(id,name)=>{

    const{error}=await sb.from("categories").delete().eq("id",id);
    if(error)return notify(error.message,"error");
    notify("Удалено");refresh();
  };
  const addOption=async(catId,name)=>{
    if(!name.trim())return;
    const sort=(catOpts[catId]||[]).length;
    const{error}=await sb.from("category_options").insert({category_id:catId,name:name.trim(),sort_order:sort+1});
    if(error)return notify(error.message,"error");
    notify("Вариант создан");refresh();
  };
  const delOption=async(id,name)=>{
    if(!confirm(`Удалить «${name}»?`))return;
    const{error}=await sb.from("category_options").delete().eq("id",id);
    if(error)return notify(error.message,"error");
    notify("Удалено");refresh();
  };
  const addBinding=async(optionId,materialId,qty,visible,calcMode)=>{
    console.log("addBinding:",{optionId,materialId,qty,visible,calcMode});
    const{error}=await sb.from("option_materials").insert({option_id:optionId,material_id:materialId,quantity:qty,visible,calc_mode:calcMode||"fixed"});

    notify("Материал привязан ("+calcMode+")");refresh();
  };
  const updateBinding=async(id,qty,visible,calcMode)=>{
    console.log("updateBinding:",{id,qty,visible,calcMode});
    const{error}=await sb.from("option_materials").update({quantity:qty,visible,calc_mode:calcMode||"fixed"}).eq("id",id);
    if(error)return notify(error.message,"error");
    notify("Обновлено ("+calcMode+")");refresh();
  };
  const delBinding=async(id)=>{
    const{error}=await sb.from("option_materials").delete().eq("id",id);
    if(error)return notify(error.message,"error");
    notify("Удалено");refresh();
  };

  return(<div>

// ── Dynamic Tab Content ──
function DynTab({tabId,db,sel,setSel}){
  const tabCats=useMemo(()=>db.categories.filter(c=>c.tab_id===tabId),[db,tabId]);
  const isSurface=SURFACE_IDS.includes(tabId);
  const isFloor=tabId==="floor";
  const isMainWall=tabId==="main_wall";
  const isGlazing=tabId==="glazing";
  const dims=(sel[tabId]||{})._dims||{length:0,height:0};
  const dir=(sel[tabId]||{})._dir||"vertical";
  const hasWindow=(sel[tabId]||{})._hasWindow||false;
  const needOtkos=(sel[tabId]||{})._needOtkos||false;
  const WINDOW_W=2000, WINDOW_H=1300;
  const windowArea=(WINDOW_W/1000)*(WINDOW_H/1000);
  const rawArea=isSurface?(dims.length/1000)*(dims.height/1000):0;
  const area=isSurface?(isMainWall&&hasWindow?Math.max(0,rawArea-windowArea):rawArea):0;

  // ── Остекление: определяем контекст ──
  const whatDoCat=isGlazing?tabCats.find(c=>{const n=c.name.toLowerCase();return n.includes("что дел")||n.includes("вариант")}):null;
  const whatDoOptId=whatDoCat?(sel[tabId]||{})[whatDoCat.id]:null;
  const whatDoOpt=whatDoOptId?db.options.find(o=>o.id===whatDoOptId):null;
  const whatDoName=(whatDoOpt?.name||"").toLowerCase();
  const isBalcony=whatDoName.includes("балкон");
  const isLodzhia=whatDoName.includes("лоджи");

  // Категория «Основная Рама»
  const frameCat=isGlazing?tabCats.find(c=>c.name.toLowerCase().includes("основная рама")||c.name.toLowerCase()==="рама"):null;
  const frameOptId=frameCat?(sel[tabId]||{})[frameCat.id]:null;
  const frameOpt=frameOptId?db.options.find(o=>o.id===frameOptId):null;
  const frameSelected=!!frameOpt&&frameOpt.name!=="Нет"&&frameOpt.name!=="НЕТ";

  // Размеры для разных блоков остекления (рама, балконный блок, окно)
  const getBlockDims=(key)=>(sel[tabId]||{})[key]||{height:0,length:0};
  const setBlockDim=(key,k,v)=>{const cur=getBlockDims(key);setSel(p=>({...p,[tabId]:{...p[tabId],[key]:{...cur,[k]:v}}}))};
  const blockPerim=(d)=>d.height>0&&d.length>0?2*(d.height/1000+d.length/1000):0;

  const glazingDims=getBlockDims("_glazingDims");
  const glazingPerimM=blockPerim(glazingDims);
  const bbDims=getBlockDims("_bbDims"); // балконный блок
  const bbPerimM=blockPerim(bbDims);
  const winDims=getBlockDims("_winDims"); // окно
  const winPerimM=blockPerim(winDims);

  // Сайдинг: определяем по категории — если выбран чистовой материал (не Нет)
  const sidingCat=isGlazing?tabCats.find(c=>c.name.toLowerCase().includes("сайдинг")):null;
  const sidingOptId=sidingCat?(sel[tabId]||{})[sidingCat.id]:null;
  const sidingOpt=sidingOptId?db.options.find(o=>o.id===sidingOptId):null;
  const sidingName=(sidingOpt?.name||"").toLowerCase();
  const needSiding=sidingOpt&&sidingName!=="нет"&&sidingName!==""&&sidingName!=="— не выбрано —";

  const sidingDims=(sel[tabId]||{})._sidingDims||{height:800,length:0};
  const sidingDir=(sel[tabId]||{})._sidingDir||"horizontal";
  const sidingArea=(sidingDims.height/1000)*(sidingDims.length/1000);

  const mainH=(sel.main_wall||{})._dims?.height||0;
  const mainW=(sel.main_wall||{})._dims?.length||0;
  const facadeW=(sel.facade_wall||{})._dims?.length||0;
  const blW=(sel.bl_wall||{})._dims?.length||0;

  const setDim=(k,v)=>setSel(p=>({...p,[tabId]:{...p[tabId],_dims:{...dims,[k]:v}}}));
  const setDir=(d)=>setSel(p=>({...p,[tabId]:{...p[tabId],_dir:d}}));
  const setOpt=(catId,optId)=>setSel(p=>({...p,[tabId]:{...p[tabId],[catId]:optId?Number(optId):null}}));
  const getOpt=(catId)=>(sel[tabId]||{})[catId]||null;
  const setQty=(catId,matId,q)=>setSel(p=>({...p,[tabId]:{...p[tabId],["_q_"+catId+"_"+matId]:q}}));
  const getQty=(catId,matId,def)=>{const v=(sel[tabId]||{})["_q_"+catId+"_"+matId];return v!==undefined?v:def};
  const setExtra=(k,v)=>setSel(p=>({...p,[tabId]:{...p[tabId],[k]:v}}));
  const isRemoved=(catId,omId)=>!!(sel[tabId]||{})["_rm_"+catId+"_"+omId];
  const toggleRemove=(catId,omId)=>setSel(p=>({...p,[tabId]:{...p[tabId],["_rm_"+catId+"_"+omId]:!isRemoved(catId,omId)}}));
  const setSidingDim=(k,v)=>setSel(p=>({...p,[tabId]:{...p[tabId],_sidingDims:{...sidingDims,[k]:v}}}));
  const setSidingDir=(d)=>setSel(p=>({...p,[tabId]:{...p[tabId],_sidingDir:d}}));

  const suggestHeight=()=>{if(!dims.height&&mainH)setDim("height",mainH)};
  const suggestFloorDims=()=>{
    if(isFloor&&!dims.height&&(facadeW||mainW))setDim("height",facadeW||mainW);
    if(isFloor&&!dims.length&&(blW||1000))setDim("length",blW||1000);
  };

  // Фильтрация вариантов рамы по типу
  const filterFrameOpts=(cat,opts)=>{
    if(!isGlazing)return opts;
    const cn=cat.name.toLowerCase();
    if(cn.includes("основная рама")||cn==="рама"){
      if(!whatDoOpt)return opts;
      if(isBalcony)return opts.filter(o=>{const n=o.name.toLowerCase();return n.includes("п-образ")||n.includes("г-образ")});
      if(isLodzhia)return opts.filter(o=>{const n=o.name.toLowerCase();return n.includes("прямое")||n.includes("прям")});
    }
    return opts;
  };

  // Определяем скрытые категории (не показываются как выпадающий список)
  const isHiddenCat=(cat)=>{
    if(!isGlazing)return false;
    const cn=cat.name.toLowerCase();
    return cn.includes("материалы для установки")||cn.includes("материалы установки");
  };

  // Определяем блок по имени категории — какой периметр использовать
  const getInstallPerim=(catName)=>{
    const cn=catName.toLowerCase();
    if(cn.includes("основная рама"))return glazingPerimM;
    if(cn.includes("балконн"))return bbPerimM;
    if(cn.includes("окно"))return winPerimM;
    return glazingPerimM; // по умолчанию
  };

  // Определяем к какому блоку относится категория установки
  const getInstallBlockLabel=(catName)=>{
    const cn=catName.toLowerCase();
    if(cn.includes("основная рама"))return"Основная Рама";
    if(cn.includes("балконн"))return"Замена балконного блока";
    if(cn.includes("окно"))return"Окно";
    return"";
  };

  // Вспомогательная функция для блока размеров
  const DimsBlock=({label,dimsKey,perim})=>{
    const d=getBlockDims(dimsKey);
    const p=blockPerim(d);
    return(<div style={{marginTop:8,marginBottom:8,background:"var(--bg)",borderRadius:10,padding:10,border:"1px solid var(--border)"}}>
      <div style={{fontSize:12,fontWeight:600,color:"var(--accent)",marginBottom:6}}>📐 Размеры: {label}</div>
      <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"flex-end"}}>
        <NI label="Высота (мм)" value={d.height} onChange={v=>setBlockDim(dimsKey,"height",v)}/>
        <NI label="Ширина (мм)" value={d.length} onChange={v=>setBlockDim(dimsKey,"length",v)}/>
        {p>0&&<div style={{background:"var(--accent-soft)",color:"var(--accent)",fontFamily:"var(--mono)",fontSize:13,fontWeight:700,padding:"8px 14px",borderRadius:10,marginBottom:8}}>
          P = {p.toFixed(2)} п.м.
        </div>}
      </div>
    </div>);
  };

  // ── Рендер материалов установки ──
  const InstallMats=({cat,mats,dims:blkDims})=>{
    const visMats=mats.filter(m=>m.visible);
    const hidMats=mats.filter(m=>!m.visible);
    const hMm=blkDims?.height||0, wMm=blkDims?.length||0;
    const hM=hMm/1000, wM=wMm/1000;
    const perimM=hM>0&&wM>0?2*(hM+wM):0;
    const areaSqm=hM*wM;
    const cmLabels={perim:"📐периметр",width:"↔низ",width_top:"↔верх",height:"↕бок×2",fixed:"🔢фикс.",per_sqm:"📐м²",step:"📊шаг",area_sheet:"📐лист"};

    // Перевод п.м. в штуки (для длиномеров)
    const pmToSht=(pm,mat)=>{
      if(pm<=0)return 0;
      const md=parseDims(mat?.dimensions);
      if(md.d>0)return Math.ceil(pm/(md.d/1000));
      return Math.ceil(pm);
    };

    // Расчёт по режиму → {qty: штуки, hint: подсказка}
    const calcResult=(baseQty,mode,mat)=>{
      if(!baseQty||baseQty<=0)return{qty:0,hint:""};
      if(hMm<=0&&wMm<=0&&mode!=="fixed")return{qty:0,hint:"нет размеров"};
      
      if(mode==="fixed")return{qty:baseQty,hint:baseQty+" шт. (фикс.)"};
      
      if(mode==="width"||mode==="width_top"){
        const pm=baseQty*wM;
        const sht=pmToSht(pm,mat);
        return{qty:sht,hint:baseQty+"/м × "+wM.toFixed(1)+"м"+(mode==="width_top"?" (верх)":"")+" = "+pm.toFixed(1)+"п.м. → "+sht+"шт."};
      }
      if(mode==="height"){
        const pm=baseQty*hM*2;
        const sht=pmToSht(pm,mat);
        return{qty:sht,hint:baseQty+"/м × "+hM.toFixed(1)+"м × 2бок = "+pm.toFixed(1)+"п.м. → "+sht+"шт."};
      }
      if(mode==="per_sqm"){
        const q=Math.ceil(baseQty*areaSqm);
        return{qty:q,hint:baseQty+"/м² × "+areaSqm.toFixed(2)+"м² = "+q+"шт."};
      }
      if(mode==="step"){
        if(baseQty<=0)return{qty:0,hint:""};
        const stepMm=baseQty;
        const dir=(sel[tabId]||{})._dir||"vertical";
        let strips,stripLen;
        if(dir==="vertical"){strips=Math.floor(wMm/stepMm)+1;stripLen=hMm}
        else{strips=Math.floor(hMm/stepMm)+1;stripLen=wMm}
        const totalM=strips*stripLen/1000;
        const sht=pmToSht(totalM,mat);
        return{qty:sht,hint:"шаг "+stepMm+"мм → "+strips+"полос × "+(stripLen/1000).toFixed(1)+"м = "+totalM.toFixed(1)+"п.м. → "+sht+"шт."};
      }
      if(mode==="area_sheet"){
        const md=parseDims(mat?.dimensions);
        const matAreaSqm=md.d*md.s/1e6;
        if(matAreaSqm>0&&areaSqm>0){const q=Math.ceil(areaSqm/matAreaSqm*1.1*baseQty);return{qty:q,hint:areaSqm.toFixed(2)+"м² ÷ "+matAreaSqm.toFixed(3)+"м² ×1.1 = "+q+"шт."}}
        return{qty:baseQty,hint:"⚠️ нет размеров"};
      }
      // perim
      const pm=baseQty*perimM;
      const sht=pmToSht(pm,mat);
      return{qty:sht,hint:baseQty+"/м × P"+perimM.toFixed(1)+"м = "+pm.toFixed(1)+"п.м. → "+sht+"шт."};
    };

    const renderMat=(om,isHidden)=>{
      if(isRemoved(cat.id,om.id))return(<div key={om.id} style={{padding:"3px 10px",fontSize:12,color:"var(--text-dim)",background:isHidden?"var(--card)":"var(--bg)",borderRadius:isHidden?6:8,marginBottom:2,display:"flex",justifyContent:"space-between",opacity:.5}}>
        <span style={{textDecoration:"line-through"}}>{om.materials?.name}</span>
        <button onClick={()=>toggleRemove(cat.id,om.id)} style={{background:"none",border:"none",color:"var(--accent)",cursor:"pointer",fontSize:11}}>↩</button>
      </div>);
      const base=om.quantity||0;
      const mode=om.calc_mode||"fixed";
      const res=calcResult(base,mode,om.materials);
      const userQ=getQty(cat.id,om.material_id,undefined);
      const qty=userQ!==undefined?userQ:res.qty;
      const modeTag=cmLabels[mode]||"";
      return(<div key={om.id} style={{background:isHidden?"var(--card)":"var(--bg)",borderRadius:isHidden?6:10,padding:isHidden?"4px 10px":"8px 12px",marginBottom:isHidden?2:4}}>
        <div style={{display:"flex",alignItems:"center",gap:4,flexWrap:"wrap",fontSize:isHidden?12:13}}>
          <span style={{flex:1,color:"var(--text-muted)",minWidth:80}}>{om.materials?.name}</span>
          {modeTag&&<span style={{fontSize:9,color:"var(--text-dim)",padding:"1px 4px",borderRadius:6,background:isHidden?"var(--bg)":"var(--card)"}}>{modeTag}</span>}
          <input type="number" min="0" value={qty===0||qty===""?"":qty} onChange={e=>setQty(cat.id,om.material_id,e.target.value===""?0:Number(e.target.value))}
            style={{width:isHidden?55:70,padding:isHidden?"2px 5px":"5px 8px",background:isHidden?"var(--bg)":"var(--card)",border:"1px solid var(--border)",borderRadius:isHidden?6:8,color:"var(--text)",fontFamily:"var(--mono)",fontSize:isHidden?11:13,outline:"none",textAlign:"right"}}/>
          <span style={{fontSize:10,color:"var(--text-dim)"}}>шт.</span>
          {om.materials?.price>0&&qty>0&&<span className="cost-tag" style={{fontSize:11}}>={((om.materials?.price||0)*qty).toLocaleString("ru")}₽</span>}
          <button onClick={()=>toggleRemove(cat.id,om.id)} style={{background:"none",border:"none",color:"var(--danger)",cursor:"pointer",fontSize:isHidden?11:12,padding:"0 4px"}}>✕</button>
        </div>
        {res.hint&&<div style={{fontSize:9,color:"var(--accent)",padding:"2px 4px 0"}}>{res.hint}</div>}
      </div>);
    };

    return(<div>
      {(hMm>0||wMm>0)&&<div style={{fontSize:10,color:"var(--accent)",marginBottom:4}}>📏 P={perimM.toFixed(2)}м • W={wM.toFixed(2)}м • H={hM.toFixed(2)}м • S={areaSqm.toFixed(2)}м²</div>}
      {visMats.map(om=>renderMat(om,false))}
      {hidMats.length>0&&<details style={{marginTop:4}}>
        <summary style={{fontSize:12,color:"var(--warning)",cursor:"pointer",fontWeight:600,padding:"4px 0"}}>🔒 Авто ({hidMats.filter(om=>!isRemoved(cat.id,om.id)).length}/{hidMats.length})</summary>
        {hidMats.map(om=>renderMat(om,true))}
      </details>}
    </div>);
  };

  return(<div>
    {/* ── Поверхности (стены, потолок, пол) ── */}
    {isSurface&&<div style={{marginBottom:14}}>
      <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:8}}>
        <div onFocus={isFloor?suggestFloorDims:suggestHeight}>
          <NI label={isFloor?"Длина (мм)":"Высота (мм)"} value={dims.height} onChange={v=>setDim("height",v)}/>
        </div>
        <div onFocus={isFloor?suggestFloorDims:undefined}>
          <NI label="Ширина (мм)" value={dims.length} onChange={v=>setDim("length",v)}/>
        </div>
        {rawArea>0&&<div style={{background:"var(--accent-soft)",color:"var(--accent)",fontFamily:"var(--mono)",fontSize:14,fontWeight:700,padding:"8px 14px",borderRadius:10,alignSelf:"flex-end",marginBottom:8}}>
          {area.toFixed(2)} м²{isMainWall&&hasWindow?(" (−"+windowArea+" окно)"):""}
        </div>}
      </div>
      {isMainWall&&<div style={{marginBottom:10,background:"var(--bg)",borderRadius:10,padding:10,border:"1px solid var(--border)"}}>
        <Tog label="🪟 Есть балконный блок (окно 2000×1300)" value={hasWindow} onChange={v=>setExtra("_hasWindow",v)}/>
        {hasWindow&&<div style={{marginLeft:58}}>
          <div style={{fontSize:11,color:"var(--text-dim)",marginBottom:6}}>Вычет площади окна: {windowArea} м²</div>
          <Tog label="Нужны откосы + подоконник" value={needOtkos} onChange={v=>setExtra("_needOtkos",v)}/>
          {needOtkos&&<div style={{fontSize:11,color:"var(--success)",marginTop:4}}>✓ Откосы и подоконник в расчёте</div>}
        </div>}
      </div>}
      {!isFloor&&!dims.height&&mainH>0&&tabId!=="main_wall"&&<div onClick={()=>setDim("height",mainH)} style={{fontSize:11,color:"var(--accent)",cursor:"pointer",marginBottom:6,padding:"4px 8px",background:"var(--accent-soft)",borderRadius:8,display:"inline-block"}}>💡 Высота как на главной: {mainH} мм</div>}
      {isFloor&&!dims.height&&mainW>0&&<div onClick={()=>{setDim("height",facadeW||mainW);setDim("length",blW||1000)}} style={{fontSize:11,color:"var(--accent)",cursor:"pointer",marginBottom:6,padding:"4px 8px",background:"var(--accent-soft)",borderRadius:8,display:"inline-block"}}>💡 Подставить: {(facadeW||mainW)+"×"+(blW||1000)} мм</div>}
      {!isFloor&&<div style={{display:"flex",gap:6,marginBottom:4}}>
        <Ch label="↕ Вертикально" active={dir==="vertical"} onClick={()=>setDir("vertical")}/>
        <Ch label="↔ Горизонтально" active={dir==="horizontal"} onClick={()=>setDir("horizontal")}/>
      </div>}
    </div>}

    {/* ── Категории ── */}
    {tabCats.map(cat=>{
      const cn=cat.name.toLowerCase();

      // Скрытые категории (материалы установки) — не показываем как выпадающий список
      if(isHiddenCat(cat))return null;

      const allOpts=db.options.filter(o=>o.category_id===cat.id);
      const opts=filterFrameOpts(cat,allOpts);
      const selectedId=getOpt(cat.id);
      const selectedOpt=opts.find(o=>o.id===selectedId);
      const mats=selectedOpt?db.optionMaterials.filter(om=>om.option_id===selectedOpt.id):[];
      const visibleMats=mats.filter(m=>m.visible);
      const hiddenMats=mats.filter(m=>!m.visible);
      const isFinish=isSurface&&cat.name==="Вид отделки";
      const isInsul=isSurface&&cat.name==="Утепление";
      const isPaint=isSurface&&cat.name==="Покраска";
      const isFrame=isGlazing&&(cn.includes("основная рама")||cn==="рама");
      const isBB=isGlazing&&cn.includes("балконн"); // замена балконного блока
      const isWin=isGlazing&&cn.includes("окно");
      const isSidingCat=isGlazing&&cn.includes("сайдинг");

      // Показываем label категории
      const catLabel=(()=>{
        if(isGlazing&&cat.name==="Вариант")return"Что делаем";
        return cat.name;
      })();

      return(<div key={cat.id} style={{marginBottom:14}}>
        <Sl label={catLabel} value={selectedId||""} onChange={v=>setOpt(cat.id,v)}
          options={[{value:"",label:"— Не выбрано —"},...opts.map(o=>({value:o.id,label:o.name}))]}/>

        {/* Подсказка фильтрации рамы */}
        {isFrame&&whatDoOpt&&<div style={{fontSize:11,color:"var(--text-dim)",marginTop:-6,marginBottom:6,padding:"2px 8px"}}>
          {isBalcony?"Балкон → П-образное / Г-образное":isLodzhia?"Лоджия → Прямое":""}
        </div>}

        {/* Основная Рама: размеры + материалы установки */}
        {isFrame&&frameSelected&&<div>
          <DimsBlock label="Основная Рама" dimsKey="_glazingDims" perim={glazingPerimM}/>
          {/* Материалы установки «Основная Рама» — из скрытой категории */}
          {tabCats.filter(c=>c.name.toLowerCase().includes("материалы для установки")&&c.name.toLowerCase().includes("основная рама")).map(ic=>{
            const icOpts=db.options.filter(o=>o.category_id===ic.id);
            // Берём первый вариант (единственный)
            const icOpt=icOpts[0];
            if(!icOpt)return null;
            const icMats=db.optionMaterials.filter(om=>om.option_id===icOpt.id);
            if(icMats.length===0)return null;
            return(<div key={ic.id} style={{marginTop:4}}>
              <InstallMats cat={ic} mats={icMats} dims={glazingDims}/>
            </div>);
          })}
        </div>}

        {/* Замена балконного блока: размеры + материалы установки */}
        {isBB&&selectedOpt&&selectedOpt.name!=="Нет"&&selectedOpt.name!=="НЕТ"&&<div>
          <DimsBlock label="Замена балконного блока" dimsKey="_bbDims" perim={bbPerimM}/>
          {tabCats.filter(c=>c.name.toLowerCase().includes("материалы для установки")&&c.name.toLowerCase().includes("балконн")).map(ic=>{
            const icOpts=db.options.filter(o=>o.category_id===ic.id);
            const icOpt=icOpts[0];
            if(!icOpt)return null;
            const icMats=db.optionMaterials.filter(om=>om.option_id===icOpt.id);
            if(icMats.length===0)return null;
            return(<div key={ic.id}><InstallMats cat={ic} mats={icMats} dims={bbDims}/></div>);
          })}
        </div>}

        {/* Окно: размеры + материалы установки */}
        {isWin&&selectedOpt&&selectedOpt.name!=="Нет"&&selectedOpt.name!=="НЕТ"&&<div>
          <DimsBlock label="Окно" dimsKey="_winDims" perim={winPerimM}/>
          {tabCats.filter(c=>c.name.toLowerCase().includes("материалы для установки")&&c.name.toLowerCase().includes("окно")).map(ic=>{
            const icOpts=db.options.filter(o=>o.category_id===ic.id);
            const icOpt=icOpts[0];
            if(!icOpt)return null;
            const icMats=db.optionMaterials.filter(om=>om.option_id===icOpt.id);
            if(icMats.length===0)return null;
            return(<div key={ic.id}><InstallMats cat={ic} mats={icMats} dims={winDims}/></div>);
          })}
        </div>}

        {/* Сайдинг: если выбран чистовой — окно размеров + черновые из шаблонов */}
        {isSidingCat&&needSiding&&<div>
          <div style={{marginTop:8,background:"var(--bg)",borderRadius:10,padding:10,border:"1px solid var(--warning)"}}>
            <div style={{fontSize:12,fontWeight:600,color:"var(--warning)",marginBottom:6}}>📐 Размеры сайдинга</div>
            <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:8}}>
              <NI label="Высота (мм)" value={sidingDims.height} onChange={v=>setSidingDim("height",v)}/>
              <NI label="Ширина (мм)" value={sidingDims.length} onChange={v=>setSidingDim("length",v)}/>
              {sidingArea>0&&<div style={{background:"var(--accent-soft)",color:"var(--accent)",fontFamily:"var(--mono)",fontSize:14,fontWeight:700,padding:"8px 14px",borderRadius:10,alignSelf:"flex-end",marginBottom:8}}>{sidingArea.toFixed(2)} м²</div>}
            </div>
            <div style={{display:"flex",gap:6,marginBottom:6}}>
              <Ch label="↔ Горизонтально" active={sidingDir==="horizontal"} onClick={()=>setSidingDir("horizontal")}/>
              <Ch label="↕ Вертикально" active={sidingDir==="vertical"} onClick={()=>setSidingDir("vertical")}/>
            </div>
            {/* Чистовой расчёт */}
            {sidingArea>0&&visibleMats.map(om=>{
              const mat=om.materials;if(!mat)return null;
              const autoQty=calcMatQty(sidingDims.height,sidingDims.length,mat.dimensions,sidingDir,mat.is_linear);
              return(<div key={om.id} style={{marginTop:6}}>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:4}}>
                  <span style={{fontWeight:600,color:"var(--accent)"}}>{mat.name}</span>
                  <span style={{fontFamily:"var(--mono)",fontWeight:700,color:"var(--success)"}}>{autoQty} шт.</span>
                </div>
              </div>);
            })}
          </div>
        </div>}

        {/* ── Поверхности: отделка ── */}
        {isFinish&&selectedOpt&&selectedOpt.name!=="Нет"&&area>0&&visibleMats.map(om=>{
          if(isRemoved(cat.id,om.id))return(<div key={om.id} style={{padding:"4px 10px",fontSize:12,color:"var(--text-dim)",background:"var(--bg)",borderRadius:8,marginTop:4,display:"flex",justifyContent:"space-between",opacity:.5}}>
            <span style={{textDecoration:"line-through"}}>{om.materials?.name}</span>
            <button onClick={()=>toggleRemove(cat.id,om.id)} style={{background:"none",border:"none",color:"var(--accent)",cursor:"pointer",fontSize:11}}>↩</button>
          </div>);
          let effH=dims.height, effW=dims.length;
          if(isMainWall&&hasWindow&&rawArea>0){const ratio=area/rawArea;effW=Math.round(dims.length*ratio)}
          const defQty=calcMatQty(effH,effW,om.materials?.dimensions,dir,om.materials?.is_linear);
          const userQty=getQty(cat.id,om.material_id,undefined);
          const autoQty=userQty!==undefined?userQty:defQty;
          return(<div key={om.id} style={{background:"var(--bg)",borderRadius:12,padding:12,marginTop:6,border:"1px solid var(--border)"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
              <span style={{fontSize:13,fontWeight:600,color:"var(--accent)",flex:1}}>{om.materials?.name}</span>
              <div style={{display:"flex",alignItems:"center",gap:4}}>
                <input type="number" min="0" value={autoQty} onChange={e=>setQty(cat.id,om.material_id,e.target.value===""?0:Number(e.target.value))}
                  style={{width:70,padding:"4px 8px",background:"var(--card)",border:"1px solid var(--border)",borderRadius:8,color:"var(--text)",fontFamily:"var(--mono)",fontSize:14,fontWeight:700,outline:"none",textAlign:"right"}}/>
                <span style={{fontSize:12,color:"var(--text-dim)"}}>шт.</span>
                <button onClick={()=>toggleRemove(cat.id,om.id)} style={{background:"none",border:"none",color:"var(--danger)",cursor:"pointer",fontSize:13,padding:"2px 6px"}}>✕</button>
              </div>
            </div>
            {userQty!==undefined&&userQty!==defQty&&<div style={{fontSize:10,color:"var(--warning)",marginBottom:4}}>⚠ Изменено (авто: {defQty})</div>}
            <div style={{fontSize:10,color:"var(--text-dim)",marginBottom:4}}>
              {om.materials?.is_linear!==false?"📏 Длиномер":"📐 Площадной"} • {om.materials?.dimensions||"?"} • {dir==="vertical"?"↕":"↔"}
            </div>
            {om.materials?.price>0&&<div style={{fontSize:12,color:"var(--text-dim)",marginBottom:4}}>
              {om.materials.price}₽ × {autoQty} = <span className="cost-tag">{(om.materials.price*autoQty).toLocaleString("ru")}₽</span>
            </div>}
          </div>);
        })}

        {/* Утепление */}
        {isInsul&&selectedOpt&&selectedOpt.name!=="Нет"&&area>0&&visibleMats.map(om=>{
          if(isRemoved(cat.id,om.id))return null;
          const autoQty=calcInsulation(area);
          return(<div key={om.id} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 12px",background:"var(--bg)",borderRadius:10,marginBottom:4,flexWrap:"wrap"}}>
            <span style={{flex:1,fontSize:13,color:"var(--text-muted)"}}>{om.materials?.name}</span>
            <span style={{fontFamily:"var(--mono)",fontSize:13,fontWeight:600,color:"var(--success)"}}>{autoQty} шт.</span>
            {om.materials?.price>0&&<span className="cost-tag">{((om.materials?.price||0)*autoQty).toLocaleString("ru")}₽</span>}
          </div>);
        })}

        {/* Покраска */}
        {isPaint&&selectedOpt&&selectedOpt.name!=="Нет"&&area>0&&<div style={{background:"var(--bg)",borderRadius:10,padding:10,marginTop:4,border:"1px solid var(--border)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:13}}>
            <span style={{color:"var(--text-muted)"}}>🎨 Краска (1л/7м²)</span>
            <span style={{fontFamily:"var(--mono)",fontWeight:700,color:"var(--success)"}}>{(Math.ceil(area/7*100)/100)} л.</span>
          </div>
        </div>}

        {/* Стандартные открытые — НЕ для остекления, НЕ для сайдинга, НЕ для отделки */}
        {!isFinish&&!isInsul&&!isPaint&&!isFrame&&!isBB&&!isWin&&!isSidingCat&&visibleMats.map(om=>{
          if(isRemoved(cat.id,om.id))return(<div key={om.id} style={{padding:"3px 10px",fontSize:12,color:"var(--text-dim)",background:"var(--bg)",borderRadius:8,marginBottom:2,display:"flex",justifyContent:"space-between",opacity:.5}}>
            <span style={{textDecoration:"line-through"}}>{om.materials?.name}</span>
            <button onClick={()=>toggleRemove(cat.id,om.id)} style={{background:"none",border:"none",color:"var(--accent)",cursor:"pointer",fontSize:11}}>↩</button>
          </div>);
          return(<div key={om.id} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 12px",background:"var(--bg)",borderRadius:10,marginBottom:4,flexWrap:"wrap"}}>
            <span style={{flex:1,fontSize:13,color:"var(--text-muted)",minWidth:120}}>{om.materials?.name}</span>
            {om.materials?.price>0&&<span className="price-tag">{om.materials.price}₽/{om.materials.unit}</span>}
            <input type="number" min="0" value={getQty(cat.id,om.material_id,om.quantity)||""} onChange={e=>setQty(cat.id,om.material_id,e.target.value===""?0:Number(e.target.value))}
              style={{width:80,padding:"6px 10px",background:"var(--card)",border:"1px solid var(--border)",borderRadius:8,color:"var(--text)",fontFamily:"var(--mono)",fontSize:13,outline:"none",textAlign:"right"}}/>
            <span style={{fontSize:11,color:"var(--text-dim)"}}>{om.materials?.unit}</span>
            <button onClick={()=>toggleRemove(cat.id,om.id)} style={{background:"none",border:"none",color:"var(--danger)",cursor:"pointer",fontSize:12,padding:"0 4px"}}>✕</button>
          </div>);
        })}

        {/* Скрытые (авто) — стандартные, с calc_mode */}
        {!isFrame&&!isBB&&!isWin&&!isSidingCat&&hiddenMats.length>0&&(()=>{
          const hMm=dims.height||0, wMm=dims.length||0;
          const hM=hMm/1000, wM=wMm/1000;
          const perimM=hM>0&&wM>0?2*(hM+wM):0;
          const areaSqm=hM*wM;
          const toSht=(pm,mat)=>{
            if(pm<=0)return 0;
            const md=parseDims(mat?.dimensions);
            if(md.d>0)return Math.ceil(pm/(md.d/1000));
            return Math.ceil(pm);
          };
          const matLen=(mat)=>{const md=parseDims(mat?.dimensions);return md.d>0?(md.d/1000):0};
          const calcHidden=(base,mode,mat)=>{
            if(!base||base<=0)return{qty:0,hint:""};
            const ml=matLen(mat);
            const lenInfo=ml>0?" ÷ "+ml+"м":"";
            if(mode==="fixed")return{qty:base,hint:base+" шт. (фикс.)"};
            if(mode==="width"||mode==="width_top"){const pm=base*wM;const s=toSht(pm,mat);return{qty:s,hint:base+"/м × "+wM.toFixed(1)+"м = "+pm.toFixed(1)+"п.м."+lenInfo+" → "+s+"шт."}}
            if(mode==="height"){const pm=base*hM*2;const s=toSht(pm,mat);return{qty:s,hint:base+"/м × "+hM.toFixed(1)+"м × 2 = "+pm.toFixed(1)+"п.м."+lenInfo+" → "+s+"шт."+(ml<=0?" ⚠️ нет размеров материала!":"")}}
            if(mode==="per_sqm"){const q=Math.ceil(base*areaSqm);return{qty:q,hint:base+"/м² × "+areaSqm.toFixed(2)+"м² = "+q+"шт."}}
            if(mode==="step"&&hMm>0&&wMm>0){
              const stepMm=base;
              let strips,stripLen;
              if(dir==="vertical"){strips=Math.floor(wMm/stepMm)+1;stripLen=hMm}
              else{strips=Math.floor(hMm/stepMm)+1;stripLen=wMm}
              const totalM=strips*stripLen/1000;
              const s=toSht(totalM,mat);
              return{qty:s,hint:"шаг "+stepMm+"мм → "+strips+"пол.×"+(stripLen/1000).toFixed(1)+"м = "+totalM.toFixed(1)+"п.м."+lenInfo+" → "+s+"шт."};
            }
            if(mode==="perim"){const pm=base*perimM;const s=toSht(pm,mat);return{qty:s,hint:base+"/м × P"+perimM.toFixed(1)+"м = "+pm.toFixed(1)+"п.м."+lenInfo+" → "+s+"шт."}}
            if(mode==="area_sheet"){
              const md=parseDims(mat?.dimensions);
              const matAreaSqm=md.d*md.s/1e6;
              if(matAreaSqm>0&&areaSqm>0){const q=Math.ceil(areaSqm/matAreaSqm*1.1*base);return{qty:q,hint:areaSqm.toFixed(2)+"м² ÷ "+matAreaSqm.toFixed(3)+"м² ×1.1 = "+q+"шт."}}
              return{qty:base,hint:"⚠️ нет размеров материала для расчёта площади"};
            }
            return{qty:base,hint:""};
          };
          return(<details style={{marginTop:4}}>
            <summary style={{fontSize:12,color:"var(--warning)",cursor:"pointer",fontWeight:600,padding:"4px 0"}}>🔒 Авто ({hiddenMats.filter(om=>!isRemoved(cat.id,om.id)).length}/{hiddenMats.length})</summary>
            {hiddenMats.map(om=>{
              if(isRemoved(cat.id,om.id))return(<div key={om.id} style={{display:"flex",justifyContent:"space-between",padding:"3px 10px",fontSize:12,color:"var(--text-dim)",borderRadius:6,background:"var(--card)",marginBottom:2,opacity:.5}}>
                <span style={{textDecoration:"line-through"}}>{om.materials?.name}</span>
                <button onClick={()=>toggleRemove(cat.id,om.id)} style={{background:"none",border:"none",color:"var(--accent)",cursor:"pointer",fontSize:10}}>↩</button>
              </div>);
              const base=om.quantity||0;
              const mode=om.calc_mode||"fixed";
              const res=calcHidden(base,mode,om.materials);
              const userQ=getQty(cat.id,om.material_id,undefined);
              const qty=userQ!==undefined?userQ:res.qty;
              const cmTag={perim:"📐P",width:"↔низ",width_top:"↔верх",height:"↕бок",fixed:"🔢",per_sqm:"📐м²",step:"📊"}[mode]||"";
              return(<div key={om.id} style={{background:"var(--card)",borderRadius:6,padding:"4px 10px",marginBottom:2}}>
                <div style={{display:"flex",alignItems:"center",gap:4,fontSize:12,color:"var(--text-muted)",flexWrap:"wrap"}}>
                  <span style={{flex:1,minWidth:80}}>{om.materials?.name}</span>
                  {cmTag&&<span style={{fontSize:9,color:"var(--text-dim)",padding:"1px 4px",borderRadius:6,background:"var(--bg)"}}>{cmTag}</span>}
                  <input type="number" min="0" value={qty===0||qty===""?"":qty} onChange={e=>setQty(cat.id,om.material_id,e.target.value===""?0:Number(e.target.value))}
                    style={{width:55,padding:"2px 5px",background:"var(--bg)",border:"1px solid var(--border)",borderRadius:6,color:"var(--text)",fontFamily:"var(--mono)",fontSize:11,outline:"none",textAlign:"right"}}/>
                  <span style={{fontSize:10,color:"var(--text-dim)"}}>{om.materials?.unit}</span>
                  {om.materials?.price>0&&<span className="price-tag" style={{fontSize:11}}>{om.materials.price}₽</span>}
                  {om.materials?.price>0&&qty>0&&<span className="cost-tag" style={{fontSize:11}}>={((om.materials?.price||0)*qty).toLocaleString("ru")}₽</span>}
                  <button onClick={()=>toggleRemove(cat.id,om.id)} style={{background:"none",border:"none",color:"var(--danger)",cursor:"pointer",fontSize:11,padding:"0 4px"}}>✕</button>
                </div>
                {res.hint&&<div style={{fontSize:9,color:"var(--accent)",padding:"1px 4px"}}>{res.hint}</div>}
              </div>);
            })}
          </details>);
        })()}
      </div>);
    })}

    {tabCats.length===0&&<div style={{color:"var(--text-dim)",fontSize:14,padding:16,textAlign:"center"}}>Нет категорий. Добавьте через Справочник.</div>}
  </div>);
}

// ── Parse dimensions "3000*110" -> {d:3000,s:110} ──
function parseDims(s){
  if(!s)return{d:0,s:0};
  const p=String(s).replace(/\s/g,"").split(/[x*×хХ]/i).map(Number).filter(n=>n>0);
  return{d:p[0]||0,s:p[1]||0};
}

// ── Calculate material qty based on type and direction ──
// isLinear=true (длиномер: вагонка, панели): кол-во = стена / ширина_материала
// isLinear=false (листовой: ламинат, плитка): кол-во = площадь_стены / площадь_листа + 10%
function calcMatQty(heightMm, widthMm, matDims, direction, isLinear){
  const md=parseDims(matDims);
  if(md.s<=0)return 0;
  const linear=(isLinear===undefined||isLinear===null)?true:isLinear;

  if(linear){
    // Длиномер: делим размер стены на ширину материала
    const dir=direction||"vertical";
    if(dir==="vertical"){
      return Math.ceil(widthMm/md.s);
    }else{
      return Math.ceil(heightMm/md.s);
    }
  }else{
    // Не длиномер (площадной): площадь стены / площадь листа + 10% на отходы
    const wallArea=heightMm*widthMm; // мм²
    const matArea=md.d*md.s; // мм²
    if(matArea<=0)return 0;
    const raw=wallArea/matArea;
    return Math.ceil(raw*1.1); // +10% отходы
  }
}

// ── Утеплитель по площади: лист 1200*600 = 0.72м² ──
function calcInsulation(areaSqm){
  const sheetArea = 1.2 * 0.6;
  return Math.ceil(areaSqm / sheetArea);
}

// ── Main calculation ──
// ── Calculate template items based on dimensions + direction ──

function doCalc(sel,db){
  const res={};

  TABS.forEach(tab=>{
    const items=[];
    const ts=sel[tab.id]||{};
    const dims=ts._dims||{};
    const direction=ts._dir||"vertical";
    const isSurface=SURFACE_IDS.includes(tab.id);
    const isMainWall=tab.id==="main_wall";
    const heightMm=dims.height||0;
    const widthMm=dims.length||0;
    const rawAreaSqm=(heightMm/1000)*(widthMm/1000);

    const hasWindow=isMainWall&&ts._hasWindow;
    const needOtkos=isMainWall&&ts._needOtkos;
    const windowAreaSqm=(2000/1000)*(1300/1000);
    const areaSqm=hasWindow?Math.max(0,rawAreaSqm-windowAreaSqm):rawAreaSqm;

    // ── Остекление ──
    if(tab.id==="glazing"){
      const tabCats=db.categories.filter(c=>c.tab_id==="glazing");
      // Инфо-строка: что делаем + рама
      const whatCat=tabCats.find(c=>{const n=c.name.toLowerCase();return n.includes("что дел")||n.includes("вариант")});
      const whatOpt=whatCat&&ts[whatCat.id]?db.options.find(o=>o.id===ts[whatCat.id]):null;
      const frameCat=tabCats.find(c=>{const n=c.name.toLowerCase();return n.includes("основная рама")||n==="рама"});
      const frameOpt=frameCat&&ts[frameCat.id]?db.options.find(o=>o.id===ts[frameCat.id]):null;
      if(whatOpt||frameOpt){
        const desc=[(whatOpt?.name||""),(frameOpt?.name||"")].filter(Boolean).join(" — ");
        if(desc)items.push({name:"Остекление: "+desc,qty:1,unit:"компл.",price:0,cost:0,auto:false,isInfo:true});
      }

      // Функция расчёта по режиму → количество в штуках
      const calcInstall=(baseQty,mat,mode,dims)=>{
        if(!baseQty||baseQty<=0)return 0;
        const hMm=dims?.height||0, wMm=dims?.length||0;
        const hM=hMm/1000, wM=wMm/1000;
        const perimM=hM>0&&wM>0?2*(hM+wM):0;
        if(hMm<=0&&wMm<=0&&mode!=="fixed")return 0;
        
        // Перевод п.м. в штуки
        const toSht=(pm)=>{
          if(pm<=0)return 0;
          const md=parseDims(mat?.dimensions);
          if(md.d>0)return Math.ceil(pm/(md.d/1000));
          return Math.ceil(pm);
        };

        if(mode==="fixed")return baseQty;
        if(mode==="width"||mode==="width_top")return toSht(baseQty*wM);
        if(mode==="height")return toSht(baseQty*hM*2);
        if(mode==="per_sqm")return Math.ceil(baseQty*hM*wM);
        if(mode==="step"){
          const stepMm=baseQty;
          const dir=ts._dir||"vertical";
          let strips,stripLen;
          if(dir==="vertical"){strips=Math.floor(wMm/stepMm)+1;stripLen=hMm}
          else{strips=Math.floor(hMm/stepMm)+1;stripLen=wMm}
          return toSht(strips*stripLen/1000);
        }
        if(mode==="area_sheet"){
          const md=parseDims(mat?.dimensions);
          const matA=md.d*md.s/1e6;
          if(matA>0)return Math.ceil(hM*wM/matA*1.1*baseQty);
          return baseQty;
        }
        // perim
        return toSht(baseQty*perimM);
      };

      // Обработка скрытых категорий «Материалы для установки ...»
      const processInstallCat=(catNamePart,dimsKey)=>{
        const d=ts[dimsKey]||{height:0,length:0};
        tabCats.filter(c=>c.name.toLowerCase().includes("материалы для установки")&&c.name.toLowerCase().includes(catNamePart)).forEach(ic=>{
          const icOpts=db.options.filter(o=>o.category_id===ic.id);
          const icOpt=icOpts[0];if(!icOpt)return;
          db.optionMaterials.filter(om=>om.option_id===icOpt.id).forEach(om=>{
            const mat=om.materials;if(!mat)return;
            if(ts["_rm_"+ic.id+"_"+om.id])return;
            const base=om.quantity||0;
            const mode=om.calc_mode||"perim";
            const auto=calcInstall(base,mat,mode,d);
            const uq=ts["_q_"+ic.id+"_"+om.material_id];
            const qty=uq!==undefined?uq:auto;
            if(qty>0)items.push({name:mat.name,qty,unit:mat.unit,price:mat.price||0,cost:qty*(mat.price||0),auto:!om.visible});
          });
        });
      };

      // Основная Рама
      if(frameOpt&&frameOpt.name!=="Нет"&&frameOpt.name!=="НЕТ"){
        processInstallCat("основная рама","_glazingDims");
      }

      // Замена балконного блока
      const bbCat=tabCats.find(c=>c.name.toLowerCase().includes("балконн"));
      const bbOpt=bbCat&&ts[bbCat.id]?db.options.find(o=>o.id===ts[bbCat.id]):null;
      if(bbOpt&&bbOpt.name!=="Нет"&&bbOpt.name!=="НЕТ"){
        items.push({name:"Замена балк.блока: "+bbOpt.name,qty:1,unit:"компл.",price:0,cost:0,auto:false,isInfo:true});
        processInstallCat("балконн","_bbDims");
      }

      // Окно
      const winCat=tabCats.find(c=>{const n=c.name.toLowerCase();return n.includes("окно")&&!n.includes("материалы")});
      const winOpt=winCat&&ts[winCat.id]?db.options.find(o=>o.id===ts[winCat.id]):null;
      if(winOpt&&winOpt.name!=="Нет"&&winOpt.name!=="НЕТ"){
        items.push({name:"Окно: "+winOpt.name,qty:1,unit:"компл.",price:0,cost:0,auto:false,isInfo:true});
        processInstallCat("окно","_winDims");
      }

      // Сайдинг: чистовой + черновые из шаблонов
      const sidCat=tabCats.find(c=>c.name.toLowerCase().includes("сайдинг"));
      const sidOpt=sidCat&&ts[sidCat.id]?db.options.find(o=>o.id===ts[sidCat.id]):null;
      const sidName=(sidOpt?.name||"").toLowerCase();
      if(sidOpt&&sidName!=="нет"&&sidName!==""){
        const sDims=ts._sidingDims||{height:0,length:0};
        const sDir=ts._sidingDir||"horizontal";
        const sH=sDims.height||0;const sW=sDims.length||0;
        const sArea=(sH/1000)*(sW/1000);
        if(sArea>0){
          const sidMats=db.optionMaterials.filter(om=>om.option_id===sidOpt.id);
          sidMats.forEach(om=>{
            const mat=om.materials;if(!mat)return;
            const qty=calcMatQty(sH,sW,mat.dimensions,sDir,mat.is_linear);
            if(qty>0)items.push({name:mat.name+" (сайдинг)",qty,unit:mat.unit,price:mat.price||0,cost:qty*(mat.price||0),auto:!om.visible});
          });
        }
      }
    }

    // Откосы и подоконник
    if(isMainWall&&needOtkos){
      items.push({name:"Подоконник ПВХ 2000 мм",qty:1,unit:"шт.",price:0,cost:0,auto:true});
      items.push({name:"Панель откоса ПВХ",qty:3,unit:"шт.",price:0,cost:0,auto:true});
      items.push({name:"F-профиль для откосов",qty:3,unit:"шт.",price:0,cost:0,auto:true});
      items.push({name:"Стартовый профиль откоса",qty:3,unit:"шт.",price:0,cost:0,auto:true});
      items.push({name:"Пена монтажная (откосы)",qty:1,unit:"шт.",price:0,cost:0,auto:true});
    }

    const cats=db.categories.filter(c=>c.tab_id===tab.id);
    cats.forEach(cat=>{
      const cn=cat.name.toLowerCase();
      // Пропускаем скрытые категории установки
      if(tab.id==="glazing"&&(cn.includes("материалы для установки")||cn.includes("материалы установки")))return;
      // Пропускаем рамы/бб/окно/сайдинг — уже обработали выше
      if(tab.id==="glazing"&&(cn.includes("основная рама")||cn==="рама"||cn.includes("балконн")||cn.includes("сайдинг")||(cn.includes("окно")&&!cn.includes("материалы"))))return;

      const optId=ts[cat.id];
      if(!optId)return;
      const opt=db.options.find(o=>o.id===optId);
      if(!opt||opt.name==="Нет"||opt.name==="НЕТ")return;

      const mats=db.optionMaterials.filter(om=>om.option_id===optId);

      // Отделка поверхностей
      if(isSurface&&cat.name==="Вид отделки"&&areaSqm>0){
        // Вспомогательная функция для скрытых по calc_mode
        const toShtCalc=(pm,mat)=>{if(pm<=0)return 0;const md=parseDims(mat?.dimensions);return md.d>0?Math.ceil(pm/(md.d/1000)):Math.ceil(pm)};
        let effH=heightMm,effW=widthMm;
        if(hasWindow&&rawAreaSqm>0){effW=Math.round(widthMm*(areaSqm/rawAreaSqm))}
        const effHM=effH/1000,effWM=effW/1000;
        const effPerimM=effHM>0&&effWM>0?2*(effHM+effWM):0;
        const effArea=effHM*effWM;
        
        mats.forEach(om=>{
          const mat=om.materials;if(!mat)return;
          if(ts["_rm_"+cat.id+"_"+om.id])return;
          
          if(om.visible){
            // Чистовой: считаем как раньше через calcMatQty
            const defQty=calcMatQty(effH,effW,mat.dimensions,direction,mat.is_linear);
            const uq=ts["_q_"+cat.id+"_"+om.material_id];
            let qty=uq!==undefined?uq:defQty;
            if(qty>0)items.push({name:mat.name,qty,unit:mat.unit,price:mat.price||0,cost:qty*(mat.price||0),auto:false});
          }else{
            // Скрытый: считаем по calc_mode
            const base=om.quantity||0;
            const mode=om.calc_mode||"fixed";
            let autoQty=base;
            if(mode==="perim"&&effPerimM>0)autoQty=toShtCalc(base*effPerimM,mat);
            else if((mode==="width"||mode==="width_top")&&effWM>0)autoQty=toShtCalc(base*effWM,mat);
            else if(mode==="height"&&effHM>0)autoQty=toShtCalc(base*effHM*2,mat);
            else if(mode==="per_sqm"&&effArea>0)autoQty=Math.ceil(base*effArea);
            else if(mode==="step"&&effH>0&&effW>0){
              let strips,stripLen;
              if(direction==="vertical"){strips=Math.floor(effW/base)+1;stripLen=effH}
              else{strips=Math.floor(effH/base)+1;stripLen=effW}
              autoQty=toShtCalc(strips*stripLen/1000,mat);
            }
            else if(mode==="area_sheet"&&effArea>0){
              const md=parseDims(mat.dimensions);
              const matA=md.d*md.s/1e6;
              if(matA>0)autoQty=Math.ceil(effArea/matA*1.1*base);
            }
            const uq=ts["_q_"+cat.id+"_"+om.material_id];
            let qty=uq!==undefined?uq:autoQty;
            if(qty>0)items.push({name:mat.name,qty,unit:mat.unit,price:mat.price||0,cost:qty*(mat.price||0),auto:true});
          }
        });
        return;
      }

      // Утепление
      if(isSurface&&cat.name==="Утепление"&&areaSqm>0){
        mats.forEach(om=>{
          const mat=om.materials;if(!mat)return;
          if(ts["_rm_"+cat.id+"_"+om.id])return;
          const uq=ts["_q_"+cat.id+"_"+om.material_id];
          let qty=uq!==undefined?uq:calcInsulation(areaSqm);
          if(qty>0)items.push({name:mat.name,qty,unit:mat.unit,price:mat.price||0,cost:qty*(mat.price||0),auto:!om.visible});
        });
        return;
      }

      // Покраска
      if(isSurface&&cat.name==="Покраска"&&areaSqm>0){
        const pq=Math.ceil(areaSqm/7*100)/100;
        if(pq>0)items.push({name:"Краска",qty:pq,unit:"л.",price:0,cost:0,auto:true});
        return;
      }

      // Всё остальное — с поддержкой calc_mode
      mats.forEach(om=>{
        const mat=om.materials;if(!mat)return;
        if(ts["_rm_"+cat.id+"_"+om.id])return;
        const base=om.quantity||0;
        const mode=om.calc_mode||"fixed";
        // Расчёт по режиму (для стен используем размеры стены)
        const toSht=(pm)=>{if(pm<=0)return 0;const md=parseDims(mat.dimensions);return md.d>0?Math.ceil(pm/(md.d/1000)):Math.ceil(pm)};
        const hMm=heightMm,wMm=widthMm,hM=hMm/1000,wM=wMm/1000;
        const perimM=hM>0&&wM>0?2*(hM+wM):0;
        let autoQty=base;
        if(mode==="perim"&&perimM>0)autoQty=toSht(base*perimM);
        else if((mode==="width"||mode==="width_top")&&wM>0)autoQty=toSht(base*wM);
        else if(mode==="height"&&hM>0)autoQty=toSht(base*hM*2);
        else if(mode==="per_sqm"&&areaSqm>0)autoQty=Math.ceil(base*areaSqm);
        else if(mode==="step"&&hMm>0&&wMm>0){
          const dir=direction;
          let strips,stripLen;
          if(dir==="vertical"){strips=Math.floor(wMm/base)+1;stripLen=hMm}
          else{strips=Math.floor(hMm/base)+1;stripLen=wMm}
          autoQty=toSht(strips*stripLen/1000);
        }
        else if(mode==="area_sheet"&&areaSqm>0){
          const md=parseDims(mat.dimensions);
          const matA=md.d*md.s/1e6;
          if(matA>0)autoQty=Math.ceil(areaSqm/matA*1.1*base);
        }
        const uq=ts["_q_"+cat.id+"_"+om.material_id];
        let qty=uq!==undefined?uq:autoQty;
        if(qty<=0)return;
        items.push({name:mat.name,qty,unit:mat.unit,price:mat.price||0,cost:qty*(mat.price||0),auto:!om.visible});
      });
    });
    res[tab.id]=items;
  });
  return res;
}
// ── Merge duplicate items ──
function mergeItems(results){
  const merged={};
  const infoItems=[];
  Object.entries(results).forEach(([tabId,items])=>{
    if(!items)return;
    items.forEach(it=>{
      if(it.isInfo){infoItems.push({...it});return}
      const key=it.name+"||"+it.unit;
      if(merged[key]){merged[key].qty+=it.qty;merged[key].cost+=it.cost}
      else{merged[key]={...it}}
    });
  });
  return[...infoItems,...Object.values(merged).sort((a,b)=>a.name.localeCompare(b.name))];
}

}

function SkladSection({notify,db}){
  const[items,setItems]=useState([]);
  const[moves,setMoves]=useState([]);
  const[loading,setLoading]=useState(true);
  const[search,setSearch]=useState("");
  const[modal,setModal]=useState(null);
  const[tab,setTab]=useState("stock");

  const load=useCallback(async()=>{
    try{
      const[iR,mR]=await Promise.all([
        sb.from("sklad_items").select("*").order("name"),
        sb.from("sklad_moves").select("*").order("id",{ascending:false})
      ]);
      if(iR.error)throw iR.error;
      if(mR.error)throw mR.error;
      setItems(iR.data||[]);
      setMoves(mR.data||[]);
    }catch(e){notify(e.message,"error")}
    setLoading(false);
  },[]);
  useEffect(()=>{load()},[]);

  const getStock=(itemId)=>{
    let total=0;
    moves.forEach(r=>{
      if(String(r.item_id).toLowerCase()!==String(itemId).toLowerCase())return;
      const q=parseFloat(r.qty)||0;
      const t=(r.move_type||"").trim();
      if(t==="in"||t==="scrap_return")total+=q;
      else if(t==="out"||t==="reserve"||t==="scrap")total-=q;
    });
    return Math.max(0,Math.round(total*100)/100);
  };

  // Find sklad item by material name
  const findSkladItem=(matName)=>items.find(i=>i.name.toLowerCase()===matName?.toLowerCase());

  const saveItem=async(data,editId)=>{
    try{
      const clean={item_id:data.name.trim(),name:data.name.trim(),type:data.type,unit:data.unit,min_stock:data.min_stock,buy_price:data.buy_price};
      if(editId){
        // Обновляем item_id в движениях если название изменилось
        const oldItem=items.find(i=>i.id===editId);
        if(oldItem&&oldItem.item_id!==clean.item_id){
          await sb.from("sklad_moves").update({item_id:clean.item_id}).eq("item_id",oldItem.item_id);
        }
        await sb.from("sklad_items").update(clean).eq("id",editId);
      }else{
        const{error}=await sb.from("sklad_items").insert(clean);
        if(error)throw error;
        if(data._initStock>0){
          await sb.from("sklad_moves").insert({move_date:new Date().toISOString().split("T")[0],move_type:"in",item_id:data.item_id,qty:data._initStock,unit:data.unit,price:data.buy_price,comment:"Начальный остаток"});
        }
      }
      notify(editId?"Обновлено":"Позиция добавлена");
      setModal(null);load();
    }catch(e){notify(e.message,"error")}
  };

  const addMove=async(moveData)=>{
    try{
      const{error}=await sb.from("sklad_moves").insert(moveData);
      if(error)throw error;
      notify(moveData.move_type==="in"?"Приход":"Расход");
      setModal(null);load();
    }catch(e){notify(e.message,"error")}
  };

  const delItem=async(id,name)=>{
    if(!confirm(`Удалить «${name}»?`))return;
    try{
      const item=items.find(i=>i.id===id);
      if(item)await sb.from("sklad_moves").delete().eq("item_id",item.item_id);
      await sb.from("sklad_items").delete().eq("id",id);
      notify("Удалено");load();
    }catch(e){notify(e.message,"error")}
  };

  // Update material price/color/dims in materials table
  const updateMat=async(matId,updates)=>{
    try{
      const{error}=await sb.from("materials").update(updates).eq("id",matId);
      if(error)throw error;
      notify("Материал обновлён");
      // Refresh both: parent db (справочник) and local sklad
      if(window._refreshDb) await window._refreshDb();
      await load();
      setModal(null);
    }catch(e){notify(e.message,"error")}
  };

  // Add material to sklad (make it складской)
  const addToSklad=async(mat,initStock)=>{
    try{
      const{error}=await sb.from("sklad_items").insert({item_id:mat.name,name:mat.name,type:mat.color||"",unit:mat.unit||"шт.",min_stock:0,buy_price:mat.price||0});
      if(error)throw error;
      if(initStock>0){
        await sb.from("sklad_moves").insert({move_date:new Date().toISOString().split("T")[0],move_type:"in",item_id:mat.name,qty:initStock,unit:mat.unit||"шт.",price:mat.price||0,comment:"Начальный остаток"});
      }
      notify("Добавлено на склад");
      setModal(null);load();
    }catch(e){notify(e.message,"error")}
  };

  // Remove from sklad (make it заказной again)
  const removeFromSklad=async(skladItem)=>{
    if(!confirm(`Убрать «${skladItem.name}» со склада? Все движения будут удалены.`))return;
    try{
      await sb.from("sklad_moves").delete().eq("item_id",skladItem.item_id);
      await sb.from("sklad_items").delete().eq("id",skladItem.id);
      notify("Убрано со склада");
      setModal(null);load();
    }catch(e){notify(e.message,"error")}
  };

  // Items with stock > 0
  const inStock=items.filter(i=>getStock(i.item_id)>0);
  const filteredStock=inStock.filter(i=>i.name.toLowerCase().includes(search.toLowerCase()));

  // All materials from справочник
  const allMats=db?.materials||[];
  const filteredMats=allMats.filter(m=>m.name.toLowerCase().includes(search.toLowerCase()));

  if(loading)return <div style={{textAlign:"center",padding:32,color:"var(--text-muted)"}}>⏳ Загрузка склада...</div>;

  return(<div>
    {/* Tabs */}
    <div style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap"}}>
      <Ch label={`🏪 В наличии (${inStock.length})`} active={tab==="stock"} onClick={()=>{setTab("stock");setSearch("")}}/>
      <Ch label={`📋 База всех материалов (${allMats.length})`} active={tab==="base"} onClick={()=>{setTab("base");setSearch("")}}/>
      <Ch label="📓 Журнал" active={tab==="log"} onClick={()=>{setTab("log");setSearch("")}}/>
    </div>
    {/* Actions */}
    <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
      {tab==="stock"&&<>
        <button onClick={()=>setModal({type:"move"})} style={{padding:"6px 12px",borderRadius:10,background:"var(--success-soft)",color:"var(--success)",border:"1px solid var(--success)",fontFamily:"var(--font)",fontSize:12,fontWeight:600,cursor:"pointer"}}>↕ Движение</button>
      </>}
      {tab==="base"&&<>
        <button onClick={()=>setModal({type:"addMat"})} style={{padding:"6px 12px",borderRadius:10,background:"var(--accent-soft)",color:"var(--accent)",border:"1px solid var(--accent)",fontFamily:"var(--font)",fontSize:12,fontWeight:600,cursor:"pointer"}}>＋ Новый материал</button>
      </>}
    </div>

    {/* Search */}
    {tab!=="log"&&<input placeholder="🔍 Поиск..." value={search} onChange={e=>setSearch(e.target.value)}
      style={{width:"100%",padding:"9px 12px",background:"var(--bg)",border:"1px solid var(--border)",borderRadius:10,color:"var(--text)",fontFamily:"var(--font)",fontSize:13,outline:"none",marginBottom:10}}/>}

    {/* ═══ TAB 1: В наличии ═══ */}
    {tab==="stock"&&<div>
      {filteredStock.length===0&&<div style={{textAlign:"center",color:"var(--text-dim)",padding:24,fontSize:13}}>
        {search?"Ничего не найдено":"Склад пуст. Добавьте позиции и оформите приход."}
      </div>}
      {filteredStock.map(item=>{
        const stock=getStock(item.item_id);
        const isLow=item.min_stock>0&&stock<=item.min_stock;
        return(<div key={item.id} style={{display:"flex",alignItems:"center",gap:8,padding:"10px 14px",background:"var(--bg)",borderRadius:12,marginBottom:4,border:`1px solid ${isLow?"var(--danger)":"var(--border)"}`,flexWrap:"wrap"}}>
          <div style={{flex:1,minWidth:120}}>
            <div style={{fontSize:13,fontWeight:600}}>{item.name}</div>
            <div style={{fontSize:11,color:"var(--text-dim)"}}>{item.type||item.unit}{item.min_stock>0?` • мин: ${item.min_stock}`:""}</div>
          </div>
          <div style={{textAlign:"right",minWidth:50}}>
            <div style={{fontFamily:"var(--mono)",fontSize:16,fontWeight:700,color:isLow?"var(--danger)":stock>0?"var(--success)":"var(--text-dim)"}}>{stock}</div>
            <div style={{fontSize:10,color:"var(--text-dim)"}}>{item.unit}</div>
          </div>
          {item.buy_price>0&&<span className="price-tag">{item.buy_price}₽</span>}
          <div style={{display:"flex",gap:2}}>
            <button className="tree-btn" title="Приход" onClick={()=>setModal({type:"move",prefill:{item_id:item.item_id,move_type:"in",unit:item.unit,price:item.buy_price}})}>📥</button>
            <button className="tree-btn" title="Расход" onClick={()=>setModal({type:"move",prefill:{item_id:item.item_id,move_type:"out",unit:item.unit,price:item.buy_price}})}>📤</button>
            <button className="tree-btn" title="Редактировать" onClick={()=>setModal({type:"item",edit:item})}>✏️</button>
            <button className="tree-btn del" title="Удалить" onClick={()=>delItem(item.id,item.name)}>✕</button>
          </div>
        </div>);
      })}
    </div>}

    {/* ═══ TAB 2: База материалов ═══ */}
    {tab==="base"&&<div>
      <div style={{fontSize:11,color:"var(--text-dim)",marginBottom:8,padding:"0 4px"}}>
        🏪 = на складе &nbsp; 🛒 = заказной &nbsp; Нажмите на позицию для редактирования
      </div>
      {filteredMats.length===0&&<div style={{textAlign:"center",color:"var(--text-dim)",padding:24}}>Нет материалов</div>}
      {filteredMats.map(mat=>{
        const si=findSkladItem(mat.name);
        const stock=si?getStock(si.item_id):0;
        const onSklad=!!si;
        return(<div key={mat.id} style={{display:"flex",alignItems:"center",gap:8,padding:"10px 14px",background:"var(--bg)",borderRadius:10,marginBottom:3,flexWrap:"wrap",border:"1px solid var(--border)",transition:"border-color .15s"}}
          onMouseEnter={e=>e.currentTarget.style.borderColor="var(--accent)"} onMouseLeave={e=>e.currentTarget.style.borderColor="var(--border)"}>
          <span style={{fontSize:14,width:20,textAlign:"center",cursor:"pointer"}} onClick={()=>setModal({type:"matEdit",mat,skladItem:si})}>{onSklad?"🏪":"🛒"}</span>
          <div style={{flex:1,minWidth:120,cursor:"pointer"}} onClick={()=>setModal({type:"matEdit",mat,skladItem:si})}>
            <div style={{fontSize:13,fontWeight:600}}>{mat.name}</div>
            <div style={{fontSize:10,color:"var(--text-dim)"}}>
              {mat.color&&mat.color+" • "}{mat.dimensions||""}{mat.unit?" • "+mat.unit:""}
            </div>
          </div>
          {onSklad&&<div style={{textAlign:"right"}}>
            <div style={{fontFamily:"var(--mono)",fontSize:14,fontWeight:700,color:stock>0?"var(--success)":"var(--text-dim)"}}>{stock}</div>
            <div style={{fontSize:9,color:"var(--text-dim)"}}>{si.unit}</div>
          </div>}
          {mat.price>0&&<span className="price-tag">{mat.price}₽</span>}
          {!onSklad&&<span style={{fontSize:10,color:"var(--warning)",padding:"2px 6px",borderRadius:8,background:"var(--warning-soft)"}}>заказной</span>}
          <button onClick={async(e)=>{e.stopPropagation();if(!confirm("Удалить «"+mat.name+"» из базы? Все привязки тоже будут удалены."))return;try{await sb.from("option_materials").delete().eq("material_id",mat.id);await sb.from("materials").delete().eq("id",mat.id);notify("Материал удалён");if(window._refreshDb)await window._refreshDb();load()}catch(err){notify(err.message,"error")}}} className="tree-btn del" title="Удалить из базы" style={{flexShrink:0}}>🗑</button>
        </div>);
      })}
    </div>}

    {/* ═══ TAB 3: Журнал ═══ */}
    {tab==="log"&&<div>
      {moves.length===0&&<div style={{textAlign:"center",color:"var(--text-dim)",padding:24}}>Нет движений</div>}
      {moves.slice(0,80).map(mv=>{
        const isIn=mv.move_type==="in"||mv.move_type==="scrap_return";
        const typeLabel={in:"Приход",out:"Расход",reserve:"Резерв",scrap:"Списание",scrap_return:"Возврат"}[mv.move_type]||mv.move_type;
        const itemName=items.find(i=>i.item_id===mv.item_id)?.name||mv.item_id;
        return(<div key={mv.id} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",background:"var(--bg)",borderRadius:10,marginBottom:3,fontSize:12,flexWrap:"wrap"}}>
          <span style={{fontFamily:"var(--mono)",color:"var(--text-dim)",minWidth:70,fontSize:11}}>{mv.move_date||""}</span>
          <span style={{padding:"2px 8px",borderRadius:10,fontSize:10,fontWeight:600,background:isIn?"var(--success-soft)":"var(--danger-soft)",color:isIn?"var(--success)":"var(--danger)"}}>{typeLabel}</span>
          <span style={{flex:1,minWidth:80,color:"var(--text-muted)"}}>{itemName}</span>
          <span style={{fontFamily:"var(--mono)",fontWeight:600,color:isIn?"var(--success)":"var(--danger)"}}>{isIn?"+":"−"}{mv.qty} {mv.unit}</span>
          {mv.order_num&&<span style={{fontSize:10,color:"var(--accent)"}}>📋{mv.order_num}</span>}
          {mv.comment&&<span style={{fontSize:10,color:"var(--text-dim)",width:"100%",paddingLeft:78}}>{mv.comment}</span>}
        </div>);
      })}
    </div>}

    {/* Modals */}
    {modal&&modal.type==="item"&&<SkladItemModal item={modal.edit} prefillName={modal.prefillName} prefillUnit={modal.prefillUnit} prefillPrice={modal.prefillPrice} onSave={saveItem} onClose={()=>setModal(null)}/>}
    {modal&&modal.type==="move"&&<SkladMoveModal items={items} prefill={modal.prefill} onSave={addMove} onClose={()=>setModal(null)}/>}
    {modal&&modal.type==="matEdit"&&<MatEditModal mat={modal.mat} skladItem={modal.skladItem} getStock={getStock} onUpdateMat={updateMat} onAddToSklad={addToSklad} onRemoveFromSklad={removeFromSklad} onClose={()=>setModal(null)}/>}
    {modal&&modal.type==="addMat"&&<ModalAddNewMat onSave={async(d)=>{
      try{
        const{error}=await sb.from("materials").insert(d);
        if(error)throw error;
        notify("Материал добавлен в базу");
        if(window._refreshDb)await window._refreshDb();
        setModal(null);
      }catch(e){notify(e.message,"error")}
    }} onClose={()=>setModal(null)}/>}
  </div>);
}

function MatEditModal({mat,skladItem,getStock,onUpdateMat,onAddToSklad,onRemoveFromSklad,onClose}){
  const[name,setName]=useState(mat.name||"");
  const[price,setPrice]=useState(mat.price||0);
  const[color,setColor]=useState(mat.color||"");
  const[dims,setDims]=useState(mat.dimensions||"");
  const[unit,setUnit]=useState(mat.unit||"шт.");
  const[isLinear,setIsLinear]=useState(mat.is_linear!==false);
  const[initStock,setInitStock]=useState(0);
  const onSklad=!!skladItem;
  const stock=onSklad?getStock(skladItem.item_id):0;

  const handleSave=()=>{
    onUpdateMat(mat.id,{name:name.trim(),price,color,dimensions:dims,unit,is_linear:isLinear});
  };

  return(<div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose()}}>
    <div className="modal-box">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
        <div style={{flex:1}}>
          <div className="m-field" style={{marginBottom:4}}><div className="m-label">Название</div>
            <input className="m-inp" value={name} onChange={e=>setName(e.target.value)} style={{fontSize:15,fontWeight:700}}/>
          </div>
          <div style={{display:"flex",gap:6,alignItems:"center"}}>
            <span style={{fontSize:12,padding:"2px 8px",borderRadius:10,fontWeight:600,
              background:onSklad?"var(--success-soft)":"var(--warning-soft)",
              color:onSklad?"var(--success)":"var(--warning)"}}>
              {onSklad?"🏪 На складе":"🛒 Заказной"}
            </span>
            {onSklad&&<span style={{fontFamily:"var(--mono)",fontSize:14,fontWeight:700,color:stock>0?"var(--success)":"var(--text-dim)"}}>остаток: {stock}</span>}
          </div>
        </div>
        <button onClick={onClose} style={{background:"none",border:"none",color:"var(--text-muted)",fontSize:20,cursor:"pointer",lineHeight:1}}>✕</button>
      </div>

      <div className="m-row">
        <div className="m-field" style={{flex:1}}><div className="m-label">Цена ₽</div>
          <input type="number" className="m-inp" value={price||""} onChange={e=>setPrice(Number(e.target.value)||0)} min="0" step="0.01"/>
        </div>
        <div className="m-field" style={{flex:1}}><div className="m-label">Единица</div>
          <select className="m-inp" value={unit} onChange={e=>setUnit(e.target.value)}>
            {UNITS.map(u=><option key={u}>{u}</option>)}
          </select>
        </div>
      </div>
      <div className="m-row">
        <div className="m-field" style={{flex:1}}><div className="m-label">Цвет / описание</div>
          <input className="m-inp" value={color} onChange={e=>setColor(e.target.value)} placeholder="Натуральный"/>
        </div>
        <div className="m-field" style={{flex:1}}><div className="m-label">Размеры (мм)</div>
          <input className="m-inp" value={dims} onChange={e=>setDims(e.target.value)} placeholder="3000x96x12"/>
        </div>
      </div>

      {/* Длиномер toggle */}
      <div onClick={()=>setIsLinear(!isLinear)} style={{display:"flex",alignItems:"center",gap:12,cursor:"pointer",padding:"10px 0",userSelect:"none",marginTop:4}}>
        <div style={{width:46,height:26,borderRadius:13,flexShrink:0,background:isLinear?"var(--accent)":"var(--warning)",position:"relative",transition:"background .25s"}}>
          <div style={{width:20,height:20,borderRadius:"50%",background:"#fff",position:"absolute",top:3,left:isLinear?23:3,transition:"left .25s",boxShadow:"0 1px 3px rgba(0,0,0,.3)"}}/>
        </div>
        <div>
          <span style={{fontSize:13,fontWeight:600}}>{isLinear?"📏 Длиномер":"📐 Площадной"}</span>
          <div style={{fontSize:10,color:"var(--text-dim)"}}>{isLinear?"Считается по ширине":"Считается по площади +10%"}</div>
        </div>
      </div>

      <button className="m-btn" onClick={handleSave} style={{marginTop:8}}>💾 Сохранить изменения</button>

      {/* Переключение складской/заказной */}
      <div style={{borderTop:"1px solid var(--border)",marginTop:16,paddingTop:12}}>
        {!onSklad?<div>
          <div style={{fontSize:12,color:"var(--text-dim)",marginBottom:8}}>Сделать складской позицией — материал будет списываться со склада при подтверждении заказа</div>
          <div className="m-field"><div className="m-label">Начальный остаток</div>
            <input type="number" className="m-inp" value={initStock||""} onChange={e=>setInitStock(Number(e.target.value)||0)} min="0" placeholder="Сколько сейчас есть"/>
          </div>
          <button className="m-btn" onClick={()=>onAddToSklad(mat,initStock)} style={{background:"var(--success)",marginTop:4}}>🏪 Завести на склад</button>
        </div>
        :<div>
          <div style={{fontSize:12,color:"var(--text-dim)",marginBottom:8}}>Позиция на складе. Можно сделать заказной — тогда она не будет списываться автоматически</div>
          <button className="m-btn" onClick={()=>onRemoveFromSklad(skladItem)} style={{background:"var(--danger)",marginTop:4}}>🛒 Сделать заказным</button>
        </div>}
      </div>
    </div>
  </div>);
}

// ── APP ──
function App(){
  const[db,setDb]=useState(null);
  const[loading,setLoading]=useState(true);
  const[notif,setNotif]=useState({msg:"",type:""});
  const[showSum,setShowSum]=useState(false);
  const[sel,setSel]=useState({});
  const[results,setResults]=useState(null);
  const[orderInfo,setOI]=useState({order_number:"",address:"",phone:""});
  const[collapseKey,setCollapseKey]=useState(0);

  const notify=useCallback((msg,type="ok")=>setNotif({msg,type}),[]);
  const refresh=useCallback(async()=>{try{setDb(await loadAll())}catch(e){notify(e.message,"error")}},[]);
  useEffect(()=>{window._refreshDb=refresh},[refresh]);
  useEffect(()=>{(async()=>{try{setDb(await loadAll())}catch(e){notify(e.message,"error")}setLoading(false)})()},[]);

  const handleCalc=()=>{
    if(!db)return;
    setResults(doCalc(sel,db));
    setShowSum(true);
    notify("Расчёт выполнен!");
  };
  const handleSave=async()=>{
    if(!results)return;
    try{
      const total=Object.values(results).flat().reduce((s,r)=>s+(r.cost||0),0);
      await sb.from("orders").insert({order_number:orderInfo.order_number,address:orderInfo.address,phone:orderInfo.phone,form_data:sel,results,total_cost:total});
      notify("Заказ сохранён!");
    }catch(e){notify(e.message,"error")}
  };

  const gt=results?Object.values(results).flat().reduce((s,r)=>s+(r.cost||0),0):0;

  return(<div>
    <Notif msg={notif.msg} type={notif.type} onClose={()=>setNotif({msg:"",type:""})}/>

    {/* HEADER */}
    <div style={{background:"linear-gradient(135deg,var(--card),var(--bg))",borderBottom:"1px solid var(--border)",padding:16,position:"sticky",top:0,zIndex:100,backdropFilter:"blur(20px)"}}>
      <div style={{maxWidth:720,margin:"0 auto"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}>
          <div><div style={{fontSize:11,color:"var(--accent)",fontWeight:700,letterSpacing:2,textTransform:"uppercase",marginBottom:2}}>Калькулятор</div><div style={{fontSize:18,fontWeight:700}}>Расчёт материалов для балконов</div></div>
          <div style={{display:"flex",gap:6,flexShrink:0}}>
            {!showSum&&<button onClick={()=>setCollapseKey(k=>k+1)} style={{padding:"8px 14px",borderRadius:10,background:"var(--card)",color:"var(--text-muted)",border:"1px solid var(--border)",fontFamily:"var(--font)",fontSize:13,fontWeight:600,cursor:"pointer"}}>↑ Свернуть</button>}
            {showSum&&<button onClick={()=>setShowSum(false)} style={{padding:"8px 14px",borderRadius:10,background:"var(--accent-soft)",color:"var(--accent)",border:"1px solid var(--accent)",fontFamily:"var(--font)",fontSize:13,fontWeight:600,cursor:"pointer"}}>← Назад</button>}
            {!showSum&&<button onClick={handleCalc} style={{padding:"8px 14px",borderRadius:10,background:"var(--success-soft)",color:"var(--success)",border:"1px solid var(--success)",fontFamily:"var(--font)",fontSize:13,fontWeight:600,cursor:"pointer"}}>Итого</button>}
          </div>
        </div>
        {/* Order info */}
        <div style={{display:"flex",gap:6,marginTop:10,flexWrap:"wrap"}}>
          {[["order_number","№ заказа"],["address","Адрес"],["phone","Телефон"]].map(([k,p])=>(
            <input key={k} placeholder={p} value={orderInfo[k]} onChange={e=>setOI({...orderInfo,[k]:e.target.value})}
              style={{flex:1,minWidth:100,padding:"7px 12px",background:"var(--bg)",border:"1px solid var(--border)",borderRadius:10,color:"var(--text)",fontFamily:"var(--font)",fontSize:13,outline:"none"}}/>
          ))}
        </div>
        {gt>0&&<div style={{marginTop:8,padding:"8px 14px",background:"var(--success-soft)",borderRadius:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:13,color:"var(--success)"}}>Общая стоимость</span>
          <span style={{fontSize:18,fontWeight:700,fontFamily:"var(--mono)",color:"var(--success)"}}>{gt.toLocaleString("ru")} ₽</span>
        </div>}
      </div>
    </div>

    {/* CONTENT */}
    <div style={{maxWidth:720,margin:"0 auto",padding:"16px 16px 120px"}}>
      {loading?<div style={{textAlign:"center",padding:64,color:"var(--text-muted)"}}><div style={{fontSize:32,marginBottom:8}}>⏳</div>Загрузка...</div>
      :!db?<div style={{textAlign:"center",padding:64,color:"var(--danger)"}}><div style={{fontSize:32,marginBottom:8}}>⚠️</div>Ошибка загрузки данных</div>
      :showSum&&results?<>
        <Results results={results} setResults={setResults} orderInfo={orderInfo} onExportPDF={()=>exportPDF(results,orderInfo)}/>
        <div style={{display:"flex",gap:8,marginTop:16}}>
          <button onClick={handleSave} style={{flex:1,padding:"14px 0",background:"var(--accent)",color:"var(--bg)",border:"none",borderRadius:12,fontFamily:"var(--font)",fontSize:15,fontWeight:600,cursor:"pointer"}}>💾 Сохранить заказ</button>
          <button onClick={()=>setShowSum(false)} style={{flex:1,padding:"14px 0",background:"transparent",color:"var(--text-muted)",border:"1px solid var(--border)",borderRadius:12,fontFamily:"var(--font)",fontSize:15,fontWeight:600,cursor:"pointer"}}>← К редактированию</button>
        </div>
      </>
      :<>
        {/* TAB SECTIONS */}
        {TABS.map(tab=>(
          <Sec key={tab.id} title={tab.label} icon={tab.icon} collapseKey={collapseKey}>
            <DynTab tabId={tab.id} db={db} sel={sel} setSel={setSel}/>
          </Sec>
        ))}

        {/* ЗАКАЗЫ */}
        <Sec title="Заказы" icon="📋" collapseKey={collapseKey}>
          <OrdersSection notify={notify} onLoadOrder={(o)=>{
            setSel(o.form_data||{});
            setOI({order_number:o.order_number||"",address:o.address||"",phone:o.phone||""});
            setResults(null);
            setShowSum(false);
            notify("Заказ загружен для редактирования");
          }}/>
        </Sec>

        {/* СПРАВОЧНИК */}
        <Sec title="Справочник" icon="📖" collapseKey={collapseKey}>
          <TreeRef db={db} refresh={refresh} notify={notify}/>
        </Sec>

        {/* ШАБЛОНЫ ЧЕРНОВЫХ */}

        {/* СКЛАД */}
        <Sec title="Склад" icon="📦" collapseKey={collapseKey}>
          <SkladSection notify={notify} db={db}/>
        </Sec>
      </>}
    </div>

    {/* Floating calc button */}
    {!showSum&&db&&<div onClick={handleCalc} style={{position:"fixed",bottom:20,left:"50%",transform:"translateX(-50%)",background:"var(--accent)",color:"var(--bg)",padding:"12px 24px",borderRadius:16,fontSize:15,fontWeight:600,cursor:"pointer",boxShadow:"0 8px 32px var(--accent-glow)",zIndex:200,animation:"slideUp .4s",display:"flex",alignItems:"center",gap:10,maxWidth:"92vw",fontFamily:"var(--font)"}}>
      🧮 Рассчитать{gt>0&&<span style={{fontFamily:"var(--mono)",fontWeight:700}}>{gt.toLocaleString("ru")} ₽</span>}
    </div>}
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
